server:
  port: 8081

app:
  user:
    deletion-retention-days: 30
    deletion-batch-size: 500
    deletion-job-cron: "0 0 2 * * ?"

spring:
  application:
    name: user-service
  datasource:
    hikari:
      maximum-pool-size: 10
    url: jdbc:postgresql://localhost:5433/userdb
    username: admin
    password: admin
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  jpa:
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

logging:
  level:
   org.hibernate.SQL: OFF
   org.hibernate.orm.jdbc.bind: OFF

user:
  redis:
    user-ttl: 30m
  kafka:
    prefixes:
      user-service-prefix: user-service
    topics:
      user-service:
        user-created: ${user.kafka.prefixes.user-service-prefix}.user-created
        user-updated: ${user.kafka.prefixes.user-service-prefix}.user-updated
        user-deleted: ${user.kafka.prefixes.user-service-prefix}.user-deleted
        user-status-changed: ${user.kafka.prefixes.user-service-prefix}.user-status-changed